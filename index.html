<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="base" id="baseb">
       <div id="giff"></div>
       <div class="numbtns">
            <button class="sp butns" id="plmn">+</button>
                <button class="num butns" id="7">7</button>
                <button class="num butns" id="8">8</button>
                <button class="num butns" id="9">9</button>
            <button class="sp butns" id="dot">.</button>
                <button class="num butns" id="4">4</button>
                <button class="num butns" id="5">5</button>
                <button class="num butns" id="6">6</button>
            <button class="num butns" id="0">0</button>
                <button class="num butns" id="1">1</button>
                <button class="num butns" id="2">2</button>
                <button class="num butns" id="3">3</button>       
       </div>
       <div class="ops">
            <button class="oprtr" id="mn">-</button>
            <button class="oprtr" id="pd">x</button>
            <button class="oprtr" id="pl">+</button>
            <button class="oprtr" id="dv">÷</button>
       </div>
       <button id="ce" class="bigbtn">CE</button>
       <button id="eqto" class="bigbtn">=</button>
       <div id="screen">0</div>
       <button id="backsp">bksp</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
